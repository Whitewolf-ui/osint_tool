<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OSINT Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #00ff88; font-family: 'Courier New', monospace; padding: 30px; }
        h1 { font-size: 2rem; margin-bottom: 5px; }
        p.sub { color: #666; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #111; border: 1px solid #00ff8833; border-radius: 8px; padding: 20px; }
        .card h2 { font-size: 1rem; color: #00ff88; margin-bottom: 15px; border-bottom: 1px solid #00ff8822; padding-bottom: 8px; }
        input { width: 100%; background: #0a0a0a; border: 1px solid #00ff8844; color: #00ff88; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; margin-bottom: 10px; }
        button { background: #00ff88; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: monospace; width: 100%; }
        button:hover { background: #00cc66; }
        .result { margin-top: 15px; background: #0a0a0a; border: 1px solid #00ff8822; border-radius: 4px; padding: 10px; font-size: 0.8rem; min-height: 60px; white-space: pre-wrap; color: #aaffcc; }
    </style>
</head>
<body>
    <h1>⚡ OSINT Dashboard</h1>
    <p class="sub">Open Source Intelligence Gathering Tool</p>
    <div class="grid">
        <div class="card">
            <h2>🌐 IP Lookup</h2>
            <input id="ip-input" placeholder="e.g. 8.8.8.8" />
            <button onclick="lookup('ip')">Lookup IP</button>
            <div class="result" id="ip-result">Results will appear here...</div>
        </div>
        <div class="card">
            <h2>👤 Username Search</h2>
            <input id="username-input" placeholder="e.g. whitewolf" />
            <button onclick="lookup('username')">Search Username</button>
            <div class="result" id="username-result">Results will appear here...</div>
        </div>
        <div class="card">
            <h2>📧 Email Check</h2>
            <input id="email-input" placeholder="e.g. test@gmail.com" />
            <button onclick="lookup('email')">Check Email</button>
            <div class="result" id="email-result">Results will appear here...</div>
        </div>
        <div class="card">
            <h2>📱 Phone Lookup</h2>
            <input id="phone-input" placeholder="e.g. +2348012345678" />
            <button onclick="lookup('phone')">Lookup Phone</button>
            <div class="result" id="phone-result">Results will appear here...</div>
        </div>
    </div>
    <script>
        async function lookup(type) {
            const inputs = { ip: 'ip-input', username: 'username-input', email: 'email-input', phone: 'phone-input' }
            const value = document.getElementById(inputs[type]).value.trim()
            const resultEl = document.getElementById(`${type}-result`)
            if (!value) { resultEl.textContent = 'Please enter a value.'; return; }
            resultEl.textContent = 'Searching...'
            try {
                const res = await fetch(`/lookup/${type}?value=${encodeURIComponent(value)}`)
                const data = await res.json()
                if (type === 'username') {
                    let out = ''
                    for (const [platform, info] of Object.entries(data)) {
                        const icon = info.found ? '✅' : '❌'
                        out += `${icon} ${platform}: ${info.url}\n`
                    }
                    resultEl.textContent = out
                } else {
                    resultEl.textContent = JSON.stringify(data, null, 2)
                }
            } catch(e) { resultEl.textContent = 'Error: ' + e.message }
        }
    </script>
</body>
</html>
